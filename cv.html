<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CV — Daniel Corredor-Vallejo</title>
<meta name="description" content="Curriculum vitae of Daniel Corredor-Vallejo.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23ffffff'/%3E%3Ctext x='32' y='47' text-anchor='middle' font-family='Georgia,serif' font-size='44' fill='%231c1c1c'%3ED%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#ffffff;
    --ink:#1c1c1c;
    --faded:#6f6a63;
    --rule:#d9d4cb;
    --accent:#27506e;
  }
  *{box-sizing:border-box}
  html{font-size:17px}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:"Source Serif 4",Georgia,"Times New Roman",serif;
    line-height:1.68;
    font-feature-settings:"onum" 1;
    -webkit-font-smoothing:antialiased;
  }
  .page{max-width:700px;margin:0 auto;padding:3.4rem 1.4rem 3rem}

  .masthead{text-align:center}
  .masthead h1{
    font-family:"EB Garamond",Georgia,serif;
    font-weight:500;
    font-size:clamp(2.15rem,7vw,2.9rem);
    letter-spacing:.015em;
    margin:0 0 .85rem;
  }
  .masthead h1 a{color:inherit;text-decoration:none}
  nav{
    font-family:"EB Garamond",Georgia,serif;
    font-variant:small-caps;
    letter-spacing:.16em;
    font-size:1.02rem;
  }
  nav a{color:var(--faded);text-decoration:none;margin:0 .8rem;transition:color .15s}
  nav a:hover{color:var(--accent)}
  nav a:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  nav a[aria-current="page"]{color:var(--ink)}
  .toprule{
    height:6px;
    border-top:2px solid var(--ink);
    border-bottom:1px solid var(--ink);
    margin:1.5rem 0 2.4rem;
  }

  main p{margin:0 0 1.15rem}
  a{color:var(--accent);text-decoration:underline;text-decoration-color:#b9c6d1;text-underline-offset:3px;transition:text-decoration-color .15s}
  a:hover{text-decoration-color:var(--accent)}
  a:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .cv-download{
    display:inline-block;
    font-family:"EB Garamond",Georgia,serif;
    font-variant:small-caps;
    letter-spacing:.12em;
    font-size:1.05rem;
    color:var(--ink);
    text-decoration:none;
    border:1px solid var(--ink);
    border-radius:2px;
    padding:.5rem 1.1rem;
    margin:.2rem 0 1.6rem;
    transition:background .15s,color .15s;
  }
  .cv-download:hover{background:var(--ink);color:var(--paper)}

  .cv-frame{
    width:100%;
    height:78vh;
    min-height:480px;
    border:1px solid var(--rule);
    border-radius:2px;
  }
  .cv-fallback{
    border:1px solid var(--rule);
    border-radius:2px;
    padding:1.2rem 1.4rem;
    color:var(--faded);
    font-size:.95rem;
  }

  footer{
    margin-top:3.2rem;
    border-top:2px solid var(--ink);
    padding-top:.7rem;
    font-size:.85rem;
    color:var(--faded);
    display:flex;
    justify-content:space-between;
    gap:1rem;
    flex-wrap:wrap;
  }
  footer a{color:var(--faded)}

  @media (max-width:620px){
    .page{padding-top:2.4rem}
    nav a{margin:0 .5rem}
    .cv-frame{height:70vh}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important}
  }
</style>
</head>
<body>
<div class="page">

  <header class="masthead">
    <h1><a href="index.html">Daniel Corredor-Vallejo</a></h1>
    <nav aria-label="Main">
      <a href="index.html">Home</a>
      <a href="research.html">Research</a>
      <a href="cv.html" aria-current="page">CV</a>
    </nav>
    <div class="toprule" role="presentation"></div>
  </header>

  <main>
    <p>The latest version of my curriculum vitae is available below.</p>

    <a class="cv-download" href="assets/cv.pdf" download>Download CV (PDF)</a>

    <object class="cv-frame" data="assets/cv.pdf" type="application/pdf" aria-label="Embedded CV PDF">
      <div class="cv-fallback">
        <p style="margin:0">This browser cannot display the PDF inline. Please use the download button above, or open the CV directly <a href="assets/cv.pdf">here</a>.</p>
      </div>
    </object>
  </main>

  <footer>
    <span>© 2026 Daniel Corredor-Vallejo</span>
    <span>Last updated June 2026</span>
  </footer>

</div>
</body>
</html>
